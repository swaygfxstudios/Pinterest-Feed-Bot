name: Pinterest Feed Bot

on:
  schedule:
    # 1st and 15th of every month
    - cron: "0 12 1,15 * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run Pinterest Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node index.js

      - name: Save Pinterest Memory
        run: |
          git config --global user.name "pinterest-bot"
          git config --global user.email "actions@github.com"

          git add pinterest.json

          git commit -m "Update Pinterest memory" || echo "No changes"

          git push
